<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outils IA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bar-bg: #fff;
      --bar-border: #e0e0dd;
      --tab-color: #aaa;
      --tab-active: #1a1a1a;
      --body-bg: #f7f7f5;
    }
    :root.dark {
      --bar-bg: #161b22;
      --bar-border: rgba(255,255,255,0.08);
      --tab-color: #7d8590;
      --tab-active: #e6edf3;
      --body-bg: #0d1117;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
      background: var(--body-bg);
      transition: background .2s;
    }
    .tab-bar {
      display: flex; flex-shrink: 0; align-items: center;
      border-bottom: 0.5px solid var(--bar-border);
      background: var(--bar-bg); padding: 0 1rem 0 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
      transition: background .2s, border-color .2s;
    }
    .tab-btn {
      padding: 14px 20px; font-size: 13px; font-weight: 500;
      color: var(--tab-color); border: none; background: transparent; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -0.5px;
      transition: color .15s, border-color .15s; font-family: inherit;
    }
    .tab-btn:hover { color: var(--tab-active); }
    .tab-btn.active { color: var(--tab-active); border-bottom-color: var(--tab-active); }

    /* Theme toggle */
    .theme-btn {
      margin-left: auto; flex-shrink: 0;
      padding: 6px 12px; border-radius: 8px;
      border: 0.5px solid var(--bar-border);
      background: transparent; color: var(--tab-color);
      font-size: 13px; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 6px;
      transition: color .15s, border-color .15s, background .15s;
    }
    .theme-btn:hover { color: var(--tab-active); background: rgba(128,128,128,0.08); }

    .frames { flex: 1; position: relative; }
    .frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none; display: none;
    }
    .frame.active { display: block; }
  </style>
</head>
<body>
  <div class="tab-bar">
    <button class="tab-btn" data-tab="nir"       onclick="switchTab('nir', this)">Validateur NIR</button>
    <button class="tab-btn" data-tab="cert"      onclick="switchTab('cert', this)">Certificat Encoder</button>
    <button class="tab-btn" data-tab="base64"    onclick="switchTab('base64', this)">Base64</button>
    <button class="tab-btn" data-tab="formatter" onclick="switchTab('formatter', this)">JSON / XML</button>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">
      <span id="theme-icon">🌙</span>
      <span id="theme-label">Sombre</span>
    </button>
  </div>
  <div class="frames">
    <iframe id="frame-nir"       class="frame" src="validateur_nir.html"></iframe>
    <iframe id="frame-cert"      class="frame" src="cert_encoder.html"></iframe>
    <iframe id="frame-base64"    class="frame" src="base64_encoder.html"></iframe>
    <iframe id="frame-formatter" class="frame" src="formatter.html"></iframe>
  </div>
  <script>
    const TABS = ['nir', 'cert', 'base64', 'formatter'];
    let isDark = false;

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));
      (btn || document.querySelector(`[data-tab="${name}"]`)).classList.add('active');
      document.getElementById('frame-' + name).classList.add('active');
      history.pushState(null, '', '#' + name);
      // Propager le thème à l'iframe qui vient de s'afficher
      broadcastTheme();
    }

    function toggleTheme() {
      isDark = !isDark;
      applyTheme();
      broadcastTheme();
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function applyTheme() {
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('theme-icon').textContent  = isDark ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = isDark ? 'Clair' : 'Sombre';
    }

    function broadcastTheme() {
      document.querySelectorAll('.frame').forEach(f => {
        try { f.contentWindow.postMessage({ type: 'set-theme', dark: isDark }, '*'); } catch(e) {}
      });
    }

    // Réémettre quand une iframe finit de charger
    document.querySelectorAll('.frame').forEach(f => {
      f.addEventListener('load', () => {
        try { f.contentWindow.postMessage({ type: 'set-theme', dark: isDark }, '*'); } catch(e) {}
      });
    });

    function init() {
      // Restaurer le thème sauvegardé
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') { isDark = true; applyTheme(); }

      const hash = location.hash.slice(1);
      const tab  = TABS.includes(hash) ? hash : 'nir';
      switchTab(tab);
    }

    window.addEventListener('popstate', init);
    init();
  </script>
</body>
</html>
