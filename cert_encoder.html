<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificat Encoder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f2;
      color: #1a1a18;
      max-width: 780px;
      margin: 2rem auto;
      padding: 0 1.5rem 3rem;
    }
    #app {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      padding: 2rem;
    }
    .page-header { margin-bottom: 1.5rem; }
    h1 { font-size: 18px; font-weight: 500; margin: 0 0 .35rem; }
    .page-desc { font-size: 13px; color: #666; line-height: 1.5; }
    .page-desc code { font-family: monospace; font-size: 12px; background: #e0e0dd; padding: 1px 5px; border-radius: 4px; color: #1a1a18; }
    label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
    textarea {
      width: 100%; min-height: 160px; resize: vertical;
      background: #f5f5f2; border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px; padding: 12px; font-size: 12px; font-family: monospace;
      color: #1a1a18; line-height: 1.6; outline: none;
    }
    textarea:focus { box-shadow: 0 0 0 2px rgba(0,0,0,0.15); }
    #output-box {
      background: #f5f5f2; border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px; padding: 12px; font-size: 11px; font-family: monospace;
      color: #1a1a18; line-height: 1.6; min-height: 48px; word-break: break-all;
      white-space: pre-wrap; user-select: all;
    }
    #output-box.empty { color: #aaa; font-style: italic; font-family: system-ui, sans-serif; font-size: 13px; }
    .row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
    .badge {
      font-size: 12px; padding: 3px 10px;
      border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2);
      background: #f5f5f2; color: #666;
    }
    button {
      font-size: 13px; padding: 7px 18px;
      border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2);
      background: transparent; color: #1a1a18; cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #f5f5f2; }
    button:active { transform: scale(0.98); }
    button.success { border-color: #3b6d11; color: #3b6d11; background: #eaf3de; }
    .sep { height: 1px; background: rgba(0,0,0,0.08); margin: 1.25rem 0; }
    #char-count { font-size: 12px; color: #aaa; margin-left: auto; }
  </style>
</head>
<body>
<div class="page-header">
  <h1>Certificat Encoder</h1>
  <p class="page-desc">Encode un certificat PEM en remplaçant les sauts de ligne par <code>%0a</code> et les espaces par <code>%20</code>.</p>
</div>

<div id="app">
  <label>Certificat (entrée brute)</label>
  <textarea id="input" placeholder="Colle ton certificat ici…&#10;-----BEGIN CERTIFICATE-----&#10;MIIBxTCCAW...&#10;-----END CERTIFICATE-----"></textarea>

  <div class="sep"></div>

  <div class="row">
    <label style="margin:0">Résultat encodé</label>
    <span class="badge" id="char-count">— car.</span>
    <button id="copy-btn" onclick="copyResult()">Copier ↗</button>
  </div>
  <div id="output-box" class="empty">Le résultat apparaîtra ici</div>
</div>

<script>
  const inputEl = document.getElementById('input');
  const outputEl = document.getElementById('output-box');
  const countEl = document.getElementById('char-count');
  const copyBtn = document.getElementById('copy-btn');

  let encoded = '';

  function encode(raw) {
    return raw
      .replace(/\r\n/g, '%0a')
      .replace(/\n/g, '%0a')
      .replace(/\r/g, '%0a')
      .replace(/ /g, '%20');
  }

  function update() {
    const raw = inputEl.value;
    if (!raw.trim()) {
      encoded = '';
      outputEl.textContent = 'Le résultat apparaîtra ici';
      outputEl.classList.add('empty');
      countEl.textContent = '— car.';
      return;
    }
    encoded = encode(raw);
    outputEl.textContent = encoded;
    outputEl.classList.remove('empty');
    countEl.textContent = encoded.length.toLocaleString('fr-FR') + ' car.';
    resetCopyBtn();
  }

  function copyResult() {
    if (!encoded) return;
    navigator.clipboard.writeText(encoded).then(() => {
      copyBtn.textContent = 'Copié !';
      copyBtn.classList.add('success');
      setTimeout(resetCopyBtn, 2200);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = encoded;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyBtn.textContent = 'Copié !';
      copyBtn.classList.add('success');
      setTimeout(resetCopyBtn, 2200);
    });
  }

  function resetCopyBtn() {
    copyBtn.textContent = 'Copier ↗';
    copyBtn.classList.remove('success');
  }

  inputEl.addEventListener('input', update);
  update();
</script>
</body>
</html>

<style>
  :root.dark body { background: #0d1117; color: #e6edf3; }
  :root.dark #app { background: #161b22; border-color: rgba(255,255,255,0.1); }
  :root.dark .page-desc { color: #7d8590; }
  :root.dark .page-desc code { background: #21262d; color: #e6edf3; }
  :root.dark label { color: #7d8590; }
  :root.dark textarea { background: #21262d; border-color: rgba(255,255,255,0.1); color: #e6edf3; }
  :root.dark #output-box { background: #21262d; border-color: rgba(255,255,255,0.1); color: #e6edf3; }
  :root.dark #output-box.empty { color: #7d8590; }
  :root.dark .badge { background: #21262d; border-color: rgba(255,255,255,0.1); color: #7d8590; }
  :root.dark button { color: #e6edf3; border-color: rgba(255,255,255,0.15); }
  :root.dark button:hover { background: #21262d; }
  :root.dark .sep { background: rgba(255,255,255,0.08); }
</style>
<script>
  window.addEventListener('message', e => {
    if (e.data?.type === 'set-theme') {
      document.documentElement.classList.toggle('dark', e.data.dark);
    }
  });
</script>
