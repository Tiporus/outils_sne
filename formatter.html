<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON / XML Formatter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: rgba(255,255,255,0.08);
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;

      --c-key:    #79c0ff;
      --c-str:    #a5d6ff;
      --c-num:    #ffa657;
      --c-bool:   #ff7b72;
      --c-null:   #8b949e;
      --c-tag:    #7ee787;
      --c-attr:   #d2a8ff;
      --c-aval:   #a5d6ff;
      --c-cdata:  #e3b341;
      --c-comment:#8b949e;
      --c-punct:  #6e7681;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .topbar h1 {
      font-size: 14px; font-weight: 600;
      color: var(--text); letter-spacing: .01em;
      margin-right: 4px;
    }

    .mode-toggle {
      display: flex; gap: 2px;
      background: var(--bg); border-radius: 8px; padding: 3px;
      border: 1px solid var(--border);
    }
    .mode-btn {
      padding: 4px 14px; border-radius: 6px; border: none;
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background .15s, color .15s; font-family: inherit;
      letter-spacing: .03em;
    }
    .mode-btn.active { background: var(--surface2); color: var(--text); }

    .sep-v { width: 1px; height: 20px; background: var(--border); }

    .tb-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-size: 12px; cursor: pointer; transition: color .15s, border-color .15s;
      font-family: inherit;
    }
    .tb-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .tb-btn.active { color: var(--accent); border-color: var(--accent); }
    .tb-btn.success { color: #7ee787; border-color: #3fb950; }
    .tb-btn.danger  { color: #ff7b72; border-color: #f85149; }

    .search-wrap {
      position: relative; margin-left: auto;
    }
    .search-input {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; padding: 5px 32px 5px 10px;
      color: var(--text); font-size: 12px; font-family: inherit;
      width: 200px; outline: none;
      transition: border-color .15s, width .2s;
    }
    .search-input:focus { border-color: var(--accent); width: 260px; }
    .search-input::placeholder { color: var(--muted); }
    .search-count {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: var(--muted); pointer-events: none;
    }

    /* ── STATUS BAR ── */
    .statusbar {
      display: flex; align-items: center; gap: 12px;
      padding: 4px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; font-size: 11px; color: var(--muted);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .status-dot.ok  { background: #3fb950; }
    .status-dot.err { background: #f85149; }
    .status-msg { flex: 1; }
    .status-stats { margin-left: auto; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── INPUT PANE ── */
    .pane-input {
      width: 40%; min-width: 200px; display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
    }
    .pane-label {
      padding: 6px 12px; font-size: 11px; font-weight: 600;
      color: var(--muted); letter-spacing: .06em; text-transform: uppercase;
      background: var(--surface2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .pane-label .clear-btn {
      font-size: 11px; color: var(--muted); background: none; border: none;
      cursor: pointer; padding: 0; transition: color .15s;
    }
    .pane-label .clear-btn:hover { color: #ff7b72; }

    textarea#raw-input {
      flex: 1; resize: none;
      background: var(--bg); color: var(--text);
      border: none; outline: none;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 12.5px; line-height: 1.7;
      padding: 14px 16px;
      tab-size: 2;
    }
    textarea#raw-input::placeholder { color: var(--muted); font-style: italic; }

    /* ── OUTPUT PANE ── */
    .pane-output {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .tree-container {
      flex: 1; overflow: auto;
      padding: 14px 16px;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 12.5px; line-height: 1.75;
    }

    /* ── TREE NODES ── */
    .node { position: relative; }
    .node-line {
      display: flex; align-items: baseline; gap: 0;
      cursor: default; border-radius: 4px;
      padding: 1px 4px; margin: 0 -4px;
      transition: background .1s;
    }
    .node-line:hover { background: rgba(255,255,255,0.04); }

    .toggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 3px;
      cursor: pointer; flex-shrink: 0; margin-right: 4px;
      color: var(--muted); font-size: 10px;
      transition: background .1s, color .1s;
      user-select: none;
    }
    .toggle:hover { background: var(--surface2); color: var(--text); }
    .toggle.leaf { cursor: default; opacity: 0; pointer-events: none; }

    .node-children { padding-left: 20px; border-left: 1px solid var(--border); margin-left: 7px; }
    .node-children.collapsed { display: none; }

    .collapsed-hint {
      display: inline; font-size: 11px;
      color: var(--muted); font-style: italic;
    }

    /* JSON colors */
    .j-key   { color: var(--c-key); }
    .j-str   { color: var(--c-str); }
    .j-num   { color: var(--c-num); }
    .j-bool  { color: var(--c-bool); }
    .j-null  { color: var(--c-null); font-style: italic; }
    .j-punct { color: var(--c-punct); }

    /* XML colors */
    .x-tag   { color: var(--c-tag); }
    .x-attr  { color: var(--c-attr); }
    .x-aval  { color: var(--c-aval); }
    .x-text  { color: var(--text); }
    .x-cdata { color: var(--c-cdata); }
    .x-comm  { color: var(--c-comment); font-style: italic; }
    .x-punct { color: var(--c-punct); }

    /* Search highlight */
    .hl { background: rgba(255,200,0,0.25); border-radius: 2px; outline: 1px solid rgba(255,200,0,0.5); }
    .hl.current { background: rgba(255,140,0,0.45); outline-color: orange; }

    /* Empty/error state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 10px; color: var(--muted);
    }
    .empty-state .icon { font-size: 36px; opacity: .3; }
    .empty-state p { font-size: 13px; }

    /* Resizer */
    .resizer {
      width: 4px; background: var(--border); cursor: col-resize; flex-shrink: 0;
      transition: background .15s;
    }
    .resizer:hover, .resizer.dragging { background: var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>Formatter</h1>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-json" onclick="setMode('json')">JSON</button>
    <button class="mode-btn"        id="btn-xml"  onclick="setMode('xml')">XML</button>
  </div>

  <div class="sep-v"></div>

  <button class="tb-btn" id="btn-expand-all"   onclick="expandAll()">⊞ Tout ouvrir</button>
  <button class="tb-btn" id="btn-collapse-all" onclick="collapseAll()">⊟ Tout réduire</button>
  <button class="tb-btn" id="btn-minify"       onclick="minify()">⬡ Minifier</button>
  <button class="tb-btn" id="btn-copy"         onclick="copyFormatted()">⎘ Copier</button>

  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="Rechercher…"
           oninput="onSearch(this.value)" onkeydown="onSearchKey(event)" />
    <span class="search-count" id="search-count"></span>
  </div>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="status-dot" id="status-dot"></div>
  <span class="status-msg" id="status-msg">Collez du JSON ou du XML dans le panneau gauche</span>
  <span class="status-stats" id="status-stats"></span>
</div>

<!-- MAIN -->
<div class="main">
  <div class="pane-input" id="pane-input">
    <div class="pane-label">
      Entrée brute
      <button class="clear-btn" onclick="clearInput()">✕ Vider</button>
    </div>
    <textarea id="raw-input"
      placeholder='{"exemple": {"clé": "valeur", "nombre": 42}}'
      oninput="onRawInput()" spellcheck="false"></textarea>
  </div>

  <div class="resizer" id="resizer"></div>

  <div class="pane-output">
    <div class="pane-label">Arbre formaté</div>
    <div class="tree-container" id="tree-container">
      <div class="empty-state">
        <div class="icon">{ }</div>
        <p>Collez du JSON ou du XML à gauche</p>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let mode = 'json';
let parsed = null;
let formattedRaw = '';
let searchMatches = [];
let searchIdx = -1;

/* ══════════════════════════════════════════════
   MODE
══════════════════════════════════════════════ */
function setMode(m) {
  mode = m;
  document.getElementById('btn-json').classList.toggle('active', m === 'json');
  document.getElementById('btn-xml').classList.toggle('active',  m === 'xml');
  document.getElementById('raw-input').placeholder =
    m === 'json'
      ? '{"exemple": {"clé": "valeur", "nombre": 42, "actif": true}}'
      : '<racine attr="val"><enfant>texte</enfant></racine>';
  onRawInput();
}

/* ══════════════════════════════════════════════
   INPUT HANDLING
══════════════════════════════════════════════ */
let debounce = null;
function onRawInput() {
  clearTimeout(debounce);
  debounce = setTimeout(process, 180);
}

function process() {
  const raw = document.getElementById('raw-input').value.trim();
  if (!raw) { showEmpty(); return; }

  if (mode === 'json') processJson(raw);
  else                 processXml(raw);
}

/* ── JSON ── */
function processJson(raw) {
  try {
    parsed = JSON.parse(raw);
    formattedRaw = JSON.stringify(parsed, null, 2);
    const tree = buildJsonNode(parsed, null, true);
    render(tree);
    setStatus('ok', `JSON valide`, stats(raw, formattedRaw));
  } catch(e) {
    parsed = null; formattedRaw = '';
    render(null);
    setStatus('err', `Erreur JSON : ${e.message}`, '');
  }
}

/* ── XML ── */
function processXml(raw) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(raw, 'application/xml');
    const err = doc.querySelector('parsererror');
    if (err) throw new Error(err.textContent.split('\n')[0]);
    parsed = doc;
    formattedRaw = formatXml(raw);
    const tree = buildXmlNode(doc.documentElement, true);
    render(tree);
    setStatus('ok', `XML valide`, stats(raw, formattedRaw));
  } catch(e) {
    parsed = null; formattedRaw = '';
    render(null);
    setStatus('err', `Erreur XML : ${e.message.substring(0,120)}`, '');
  }
}

function formatXml(xml) {
  let formatted = '', indent = 0;
  const tab = '  ';
  xml.replace(/>\s*</g, '><').split(/(<[^>]+>)/).forEach(part => {
    if (!part.trim()) return;
    if (part.match(/^<\/\w/)) indent--;
    formatted += tab.repeat(Math.max(0, indent)) + part.trim() + '\n';
    if (part.match(/^<\w[^/]*[^/]>$/) && !part.match(/<.*\/>/)) indent++;
  });
  return formatted.trim();
}

/* ══════════════════════════════════════════════
   JSON TREE BUILDER
══════════════════════════════════════════════ */
let nodeId = 0;
function nid() { return 'n' + (++nodeId); }

function buildJsonNode(val, key, isRoot) {
  const id = nid();
  const type = val === null ? 'null' : Array.isArray(val) ? 'array' : typeof val;
  const isComplex = type === 'object' || type === 'array';
  const count = isComplex ? Object.keys(val).length : 0;

  let keyHtml = key !== null
    ? `<span class="j-key">"${esc(key)}"</span><span class="j-punct">: </span>`
    : '';

  if (!isComplex) {
    let valHtml;
    if (type === 'string') valHtml = `<span class="j-str">"${esc(val)}"</span>`;
    else if (type === 'number') valHtml = `<span class="j-num">${val}</span>`;
    else if (type === 'boolean') valHtml = `<span class="j-bool">${val}</span>`;
    else valHtml = `<span class="j-null">null</span>`;

    return `<div class="node">
      <div class="node-line">
        <span class="toggle leaf">▶</span>
        ${keyHtml}${valHtml}
      </div>
    </div>`;
  }

  const bracket = type === 'array' ? ['[',']'] : ['{','}'];
  const entries = type === 'array'
    ? val.map((v, i) => buildJsonNode(v, i, false))
    : Object.entries(val).map(([k,v]) => buildJsonNode(v, k, false));

  return `<div class="node">
    <div class="node-line">
      <span class="toggle" onclick="toggleNode('${id}')">▼</span>
      ${keyHtml}<span class="j-punct">${bracket[0]}</span>
      <span class="collapsed-hint" id="hint-${id}" style="display:none;">&nbsp;… ${count} élément${count>1?'s':''} &nbsp;</span>
      <span class="j-punct" id="cb-${id}" style="display:none;">${bracket[1]}</span>
    </div>
    <div class="node-children" id="${id}">
      ${entries.join('')}
    </div>
    <div class="node-line"><span class="toggle leaf">▶</span><span class="j-punct">${bracket[1]}</span></div>
  </div>`;
}

/* ══════════════════════════════════════════════
   XML TREE BUILDER
══════════════════════════════════════════════ */
function buildXmlNode(node, isRoot) {
  const id = nid();

  if (node.nodeType === 8) { // comment
    return `<div class="node"><div class="node-line">
      <span class="toggle leaf">▶</span>
      <span class="x-comm">&lt;!-- ${esc(node.nodeValue.trim())} --&gt;</span>
    </div></div>`;
  }

  if (node.nodeType === 4) { // CDATA
    return `<div class="node"><div class="node-line">
      <span class="toggle leaf">▶</span>
      <span class="x-cdata">&lt;![CDATA[ ${esc(node.nodeValue.trim())} ]]&gt;</span>
    </div></div>`;
  }

  if (node.nodeType === 3) { // text
    const t = node.nodeValue.trim();
    if (!t) return '';
    return `<div class="node"><div class="node-line">
      <span class="toggle leaf">▶</span>
      <span class="x-text">${esc(t)}</span>
    </div></div>`;
  }

  // Element
  const tag = node.tagName;
  const attrs = Array.from(node.attributes || []).map(a =>
    ` <span class="x-attr">${esc(a.name)}</span><span class="x-punct">=</span><span class="x-aval">"${esc(a.value)}"</span>`
  ).join('');

  const children = Array.from(node.childNodes)
    .map(c => buildXmlNode(c, false))
    .filter(Boolean);

  if (children.length === 0) {
    return `<div class="node"><div class="node-line">
      <span class="toggle leaf">▶</span>
      <span class="x-punct">&lt;</span><span class="x-tag">${esc(tag)}</span>${attrs}<span class="x-punct">/&gt;</span>
    </div></div>`;
  }

  const count = children.length;
  return `<div class="node">
    <div class="node-line">
      <span class="toggle" onclick="toggleNode('${id}')">▼</span>
      <span class="x-punct">&lt;</span><span class="x-tag">${esc(tag)}</span>${attrs}<span class="x-punct">&gt;</span>
      <span class="collapsed-hint" id="hint-${id}" style="display:none;">&nbsp;… ${count} enfant${count>1?'s':''} &nbsp;</span>
      <span class="x-punct" id="cb-${id}" style="display:none;">&lt;/${esc(tag)}&gt;</span>
    </div>
    <div class="node-children" id="${id}">
      ${children.join('')}
    </div>
    <div class="node-line"><span class="toggle leaf">▶</span><span class="x-punct">&lt;/${esc(tag)}&gt;</span></div>
  </div>`;
}

/* ══════════════════════════════════════════════
   TOGGLE
══════════════════════════════════════════════ */
function toggleNode(id) {
  const children = document.getElementById(id);
  const hint = document.getElementById('hint-' + id);
  const cb   = document.getElementById('cb-' + id);
  const toggle = children.previousElementSibling.querySelector('.toggle');
  const collapsed = children.classList.toggle('collapsed');
  toggle.textContent = collapsed ? '▶' : '▼';
  if (hint) hint.style.display = collapsed ? 'inline' : 'none';
  if (cb)   cb.style.display   = collapsed ? 'inline' : 'none';
}

function expandAll() {
  document.querySelectorAll('.node-children.collapsed').forEach(el => {
    el.classList.remove('collapsed');
    const hint = document.getElementById('hint-' + el.id);
    const cb   = document.getElementById('cb-'   + el.id);
    const toggle = el.previousElementSibling?.querySelector('.toggle');
    if (toggle) toggle.textContent = '▼';
    if (hint) hint.style.display = 'none';
    if (cb)   cb.style.display   = 'none';
  });
}

function collapseAll() {
  document.querySelectorAll('.node-children:not(.collapsed)').forEach(el => {
    el.classList.add('collapsed');
    const hint = document.getElementById('hint-' + el.id);
    const cb   = document.getElementById('cb-'   + el.id);
    const toggle = el.previousElementSibling?.querySelector('.toggle');
    if (toggle) toggle.textContent = '▶';
    if (hint) hint.style.display = 'inline';
    if (cb)   cb.style.display   = 'inline';
  });
}

/* ══════════════════════════════════════════════
   SEARCH
══════════════════════════════════════════════ */
function onSearch(q) {
  clearHighlights();
  searchMatches = [];
  searchIdx = -1;
  document.getElementById('search-count').textContent = '';
  if (!q.trim()) return;

  const container = document.getElementById('tree-container');
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  const regex = new RegExp(escapeRegex(q), 'gi');
  const toWrap = [];

  let node;
  while ((node = walker.nextNode())) {
    let text = node.nodeValue;
    if (!regex.test(text)) continue;
    regex.lastIndex = 0;
    toWrap.push(node);
  }

  toWrap.forEach(node => {
    const span = document.createElement('span');
    const frag = document.createDocumentFragment();
    let text = node.nodeValue;
    regex.lastIndex = 0;
    let last = 0, m;
    while ((m = regex.exec(text)) !== null) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const hl = document.createElement('mark');
      hl.className = 'hl';
      hl.textContent = m[0];
      frag.appendChild(hl);
      searchMatches.push(hl);
      last = regex.lastIndex;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  });

  if (searchMatches.length) {
    searchIdx = 0;
    highlightCurrent();
    document.getElementById('search-count').textContent = `1/${searchMatches.length}`;
  } else {
    document.getElementById('search-count').textContent = '0';
  }
}

function onSearchKey(e) {
  if (!searchMatches.length) return;
  if (e.key === 'Enter' || e.key === 'F3') {
    e.preventDefault();
    searchIdx = e.shiftKey
      ? (searchIdx - 1 + searchMatches.length) % searchMatches.length
      : (searchIdx + 1) % searchMatches.length;
    highlightCurrent();
    document.getElementById('search-count').textContent = `${searchIdx+1}/${searchMatches.length}`;
  }
}

function highlightCurrent() {
  searchMatches.forEach((m, i) => m.classList.toggle('current', i === searchIdx));
  searchMatches[searchIdx]?.scrollIntoView({ block: 'center', behavior: 'smooth' });
  // expand parents
  let el = searchMatches[searchIdx]?.parentElement;
  while (el) {
    if (el.classList.contains('node-children') && el.classList.contains('collapsed')) {
      toggleNode(el.id);
    }
    el = el.parentElement;
  }
}

function clearHighlights() {
  document.querySelectorAll('mark.hl').forEach(m => {
    m.parentNode.replaceChild(document.createTextNode(m.textContent), m);
  });
  // normalize
  document.getElementById('tree-container').normalize?.();
  searchMatches = [];
}

/* ══════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════ */
function minify() {
  if (!parsed && mode === 'json') return;
  const btn = document.getElementById('btn-minify');
  if (mode === 'json' && parsed) {
    document.getElementById('raw-input').value = JSON.stringify(parsed);
    btn.classList.add('active');
    setTimeout(() => btn.classList.remove('active'), 1500);
  } else if (mode === 'xml' && parsed) {
    const s = new XMLSerializer().serializeToString(parsed.documentElement);
    document.getElementById('raw-input').value = s.replace(/>\s+</g,'><');
    btn.classList.add('active');
    setTimeout(() => btn.classList.remove('active'), 1500);
  }
}

function copyFormatted() {
  if (!formattedRaw) return;
  const btn = document.getElementById('btn-copy');
  navigator.clipboard.writeText(formattedRaw).then(() => {
    btn.classList.add('success');
    btn.textContent = '✓ Copié';
    setTimeout(() => { btn.classList.remove('success'); btn.textContent = '⎘ Copier'; }, 2000);
  });
}

function clearInput() {
  document.getElementById('raw-input').value = '';
  showEmpty();
}

/* ══════════════════════════════════════════════
   RENDER / STATUS / UTILS
══════════════════════════════════════════════ */
function render(html) {
  nodeId = 0;
  const c = document.getElementById('tree-container');
  if (!html) {
    c.innerHTML = `<div class="empty-state"><div class="icon">⚠</div><p>Impossible de parser le contenu</p></div>`;
  } else {
    c.innerHTML = html;
  }
  // re-apply search if active
  const q = document.getElementById('search-input').value;
  if (q) onSearch(q);
}

function showEmpty() {
  parsed = null; formattedRaw = '';
  document.getElementById('tree-container').innerHTML = `
    <div class="empty-state">
      <div class="icon">{ }</div>
      <p>Collez du JSON ou du XML à gauche</p>
    </div>`;
  setStatus('', 'Collez du JSON ou du XML dans le panneau gauche', '');
  clearHighlights();
  document.getElementById('search-count').textContent = '';
}

function setStatus(type, msg, statsStr) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (type === 'ok' ? ' ok' : type === 'err' ? ' err' : '');
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('status-stats').textContent = statsStr;
}

function stats(raw, fmt) {
  const lines = fmt.split('\n').length;
  return `${raw.length.toLocaleString('fr-FR')} → ${fmt.length.toLocaleString('fr-FR')} car. · ${lines.toLocaleString('fr-FR')} lignes`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

/* ══════════════════════════════════════════════
   RESIZER
══════════════════════════════════════════════ */
(function() {
  const resizer = document.getElementById('resizer');
  const left    = document.getElementById('pane-input');
  let dragging = false, startX, startW;

  resizer.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startW = left.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.max(180, Math.min(startW + e.clientX - startX, window.innerWidth - 300));
    left.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

/* ══════════════════════════════════════════════
   DRAG & DROP sur l'input
══════════════════════════════════════════════ */
const ta = document.getElementById('raw-input');
ta.addEventListener('dragover', e => e.preventDefault());
ta.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => { ta.value = ev.target.result; onRawInput(); };
  r.readAsText(f);
});

/* ── Init ── */
showEmpty();
</script>
